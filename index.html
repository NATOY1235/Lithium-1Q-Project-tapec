<!DOCTYPE html>
<html>
<head>
    <title>Anagram Solver Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Anagram Solver Game</h2>
    <p>Level: <span id="levelDisplay">Easy</span></p>
    <p>Score: <span id="score">0</span></p>

    <div id="scrambledWord">Press Start</div>

    <input type="text" id="userInput" placeholder="Enter your answer">
    <br>

    <button id="startBtn">Start</button>
    <button id="submitBtn">Submit</button>
    <button id="nextBtn">Next Word</button>

    <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
